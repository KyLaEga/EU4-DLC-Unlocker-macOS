name: ShellCheck

on:
  push:
    paths:
      - "**.sh"
      - "bin/**"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    paths:
      - "**.sh"
      - "bin/**"
      - ".github/workflows/shellcheck.yml"
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint all scripts (with sourcing)
        run: |
          set -euo pipefail
          files=(
            bin/unlocker
            bin/lib/common.sh
            bin/lib/install.sh
            bin/lib/uninstall.sh
            bin/lib/status.sh
            install_dlc_unlocker.sh
            uninstall_dlc_unlocker.sh
          )
          echo "shellcheck version: $(shellcheck --version | sed -n 's/^version: //p')"
          shellcheck -x "${files[@]}"
          echo "All scripts pass ShellCheck cleanly."
