# EU4 game configuration
#
# Read by the unlocker engine. The engine is game-agnostic; everything that is
# specific to a game lives here as data. To support another Paradox game later,
# copy this file to games/<game>.conf and edit the values — no engine change.

game_name = Europa Universalis IV
appid = 236850
app_bundle = eu4.app
# Subdirectory inside the .app bundle where libsteam_api.dylib lives.
framework_subdir = Contents/Frameworks
# DLC content directory, relative to the game root (the folder holding the
# .app). The installer scans <game_root>/<dlc_subdir>/*/*.dlc to build the
# explicit CreamAPI [dlc] list.
dlc_subdir = dlc

# Search paths, one per line. Globs (*, ?) are allowed. $USER is expanded by
# the engine at runtime. Paths with spaces are handled correctly.
search_paths = <<EOF
/Users/$USER/Library/Application Support/Steam/steamapps/common/Europa Universalis IV
/Volumes/*/SteamLibrary/steamapps/common/Europa Universalis IV
/Volumes/*/Steam/steamapps/common/Europa Universalis IV
EOF
